[versions]
agp = "9.2.1"
coreKtx = "1.19.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
lifecycleRuntimeKtx = "2.10.0"
activityCompose = "1.13.0"
navigationCompose = "2.8.7"
lifecycleViewmodelCompose = "2.8.7"
coil = "2.6.0"
media3 = "1.6.0-beta01"
kotlin = "2.2.10"
lottie = "6.4.0"
work = "2.9.0"
securityCrypto = "1.1.0-alpha06"
leanback = "1.0.0"
cast = "21.5.0"
mediarouter = "1.7.0"
gson = "2.8.8"
okhttp = "4.9.3"
